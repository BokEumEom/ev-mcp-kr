name = "ev-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Per-session McpAgent — agents-mcp routes each MCP session to its own DO ID.
[[durable_objects.bindings]]
name = "INVENTORY"
class_name = "ChargerInventory"

# Single global durable inventory (idFromName("global")) — owns the SQLite
# database. Both ChargerInventory (per-session) and the Stage-4 sync worker
# RPC into it.
[[durable_objects.bindings]]
name = "STORE"
class_name = "InventoryStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChargerInventory"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["InventoryStore"]

# Cron-driven sync. Each tick processes a small batch of pages and persists
# progress in the InventoryStore's `sync_state` table — interruptions are
# resumed on the next tick. With pagesPerTick=1 (default) and ~250 pages
# nationwide, every-5-minute scheduling completes a full cycle inside ~21h
# while staying well under the free-plan CPU budget per invocation.
#
# Production may switch to a single daily firing once a tick can complete
# more pages safely (paid plan extends scheduled CPU time to 30 minutes):
#   crons = ["0 18 * * *"]   # 03:00 KST = 18:00 UTC previous day
[triggers]
crons = ["*/5 * * * *"]

# Secrets — set via:
#   wrangler secret put SERVICE_KEY
#   wrangler secret put VWORLD_KEY    # optional, geocoder
#   wrangler secret put DEV_SEED_TOKEN  # gates /internal/seed and /internal/sync
[vars]
LOG_LEVEL = "INFO"

# Tail / observability
[observability]
enabled = true
